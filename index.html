<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Communication Training</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
.tab-content{display:none;}
.tab-content.active{display:block;}
.nav-button.active{background:#0ea5e9;color:white;}
</style>
</head>

<body class="bg-gray-100">
<div class="max-w-6xl mx-auto p-6">

<h1 class="text-3xl font-bold text-center mb-8">
Medical Communication Training Platform
</h1>

<!-- Navigation -->
<div class="flex gap-3 justify-center mb-8">
<button id="btn-principles" class="nav-button px-6 py-3 rounded-xl bg-sky-600 text-white"
onclick="showTab('principles')">Principles</button>

<button id="btn-simulation" class="nav-button px-6 py-3 rounded-xl bg-gray-200"
onclick="showTab('simulation')">Simulation</button>

<button id="btn-quiz" class="nav-button px-6 py-3 rounded-xl bg-gray-200"
onclick="showTab('quiz')">Final Assessment</button>
</div>

<!-- Principles -->
<div id="principles" class="tab-content active bg-white p-8 rounded-xl shadow">
<h2 class="text-xl font-bold mb-4">Golden Rule</h2>
<p>Patients remember how you made them feel — not the medical details.</p>
</div>

<!-- Simulation -->
<div id="simulation" class="tab-content bg-white p-8 rounded-xl shadow">

<h2 class="text-xl font-bold mb-4">Clinical Simulation</h2>

<p class="mb-4">
Patient says: "I'm afraid I might have cancer."
</p>

<textarea id="userAnswer"
class="w-full border p-3 rounded-lg"
rows="4"
placeholder="Write your response..."></textarea>

<button onclick="submitSimulation()"
class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg">
Submit Response
</button>

<p id="simulationMessage" class="mt-4 font-bold text-green-600"></p>

</div>

<!-- Quiz -->
<div id="quiz" class="tab-content bg-white p-8 rounded-xl shadow">

<h2 class="text-xl font-bold mb-4">Final Assessment</h2>

<p class="mb-4">
When delivering death news, what is the correct approach?
</p>

<button onclick="submitQuiz('positive')"
class="block w-full mb-3 p-3 bg-gray-200 rounded-lg">
Start with positive news
</button>

<button onclick="submitQuiz('direct')"
class="block w-full mb-3 p-3 bg-gray-200 rounded-lg">
Be direct then allow silence
</button>

<button onclick="submitQuiz('nurse')"
class="block w-full mb-3 p-3 bg-gray-200 rounded-lg">
Ask the nurse to inform them
</button>

<p id="quizMessage" class="mt-4 font-bold text-green-600"></p>

</div>

</div>

<script>

let quizSubmitted = false;
let simulationSubmitted = false;

function showTab(tabId){
document.querySelectorAll('.tab-content')
.forEach(t=>t.classList.remove("active"));

document.querySelectorAll('.nav-button')
.forEach(b=>b.classList.remove("active"));

document.getElementById(tabId).classList.add("active");
document.getElementById("btn-"+tabId).classList.add("active");
}

// Simulation submission
function submitSimulation(){

if(simulationSubmitted) return;

const answer = document.getElementById("userAnswer").value;

if(answer.trim() === ""){
alert("Please write your response.");
return;
}

simulationSubmitted = true;

document.getElementById("simulationMessage")
.innerText = "Your response has been submitted successfully.";

document.getElementById("userAnswer").disabled = true;
}

// Quiz submission
function submitQuiz(choice){

if(quizSubmitted) return;

quizSubmitted = true;

document.getElementById("quizMessage")
.innerText = "Your answer has been submitted for review.";

const buttons = document.querySelectorAll("#quiz button");
buttons.forEach(btn => btn.disabled = true);

console.log("Quiz Answer:", choice);

}

</script>

</body>
</html>
