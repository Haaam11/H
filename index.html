<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Communication Training</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body class="bg-gray-100">

<!-- HERO -->
<section class="bg-blue-900 text-white text-center py-20">
    <h1 class="text-4xl font-bold">Medical Communication Training</h1>
    <p class="text-lg mt-2">Interactive Clinical Communication Course</p>
</section>

<!-- TRAINING FORM -->
<section class="max-w-4xl mx-auto p-6 bg-white rounded-3xl shadow-lg mt-10">

    <h2 class="text-2xl font-bold text-center mb-6">Submit Your Training</h2>

    <!-- Name -->
    <div class="mb-4">
        <label class="block font-bold mb-1">Full Name</label>
        <input id="traineeName" type="text"
            class="w-full border p-3 rounded-xl"
            placeholder="Type your full name here...">
    </div>

    <!-- Simulation -->
    <div class="mb-6">
        <label class="block font-bold mb-1">Simulation Response</label>
        <textarea id="simulationAnswer" rows="4"
            class="w-full border p-3 rounded-xl"
            placeholder="Write your response here..."></textarea>
    </div>

    <!-- Submit Simulation -->
    <button onclick="submitSimulation()"
        class="w-full bg-blue-700 text-white py-3 rounded-xl font-bold">
        Submit Training Response
    </button>

    <p id="simMessage" class="mt-3 text-green-600 font-bold"></p>

    <!-- QUIZ -->
    <div class="mt-10">
        <h3 class="text-xl font-bold mb-4 text-center">Final Assessment</h3>

        <button onclick="submitQuiz('positive')"
            class="w-full bg-gray-200 p-3 rounded-lg mb-3">
            Start with positive news
        </button>

        <button onclick="submitQuiz('direct')"
            class="w-full bg-gray-200 p-3 rounded-lg mb-3">
            Be direct then allow silence
        </button>

        <button onclick="submitQuiz('nurse')"
            class="w-full bg-gray-200 p-3 rounded-lg mb-3">
            Ask nurse to inform
        </button>

        <p id="quizMessage" class="font-bold text-center text-red-600"></p>
    </div>

    <!-- CERTIFICATE -->
    <div id="certificateSection" class="hidden text-center mt-10">
        <button onclick="generateCertificate()"
            class="bg-green-700 text-white px-8 py-3 rounded-xl font-bold">
            🎓 Download Certificate
        </button>
    </div>

</section>

<script>

// GOOGLE SHEET WEB APP URL
const scriptURL = "https://script.google.com/macros/s/AKfycbzxd_UT0hEq1jVXG3KV9h_1MahWkq84REIOXJOEe6ygCOOqKJviwFmGg7dxmiOv1G7b/exec";

let simAnswered = false;
let quizAnswered = false;

// SUBMIT SIMULATION
function submitSimulation() {
    const name = document.getElementById("traineeName").value.trim();
    const simText = document.getElementById("simulationAnswer").value.trim();

    if (!name || !simText) {
        alert("Please fill in your name and simulation response.");
        return;
    }

    simAnswered = true;
    document.getElementById("simMessage").innerText = "Simulation saved.";

    sendToSheet(name, simText, "");
}

// SUBMIT QUIZ
function submitQuiz(choice) {
    if (!simAnswered) {
        alert("Please submit your training response first.");
        return;
    }
    if (quizAnswered) return;

    quizAnswered = true;

    // If the correct answer is "direct"
    if (choice === "direct") {
        document.getElementById("quizMessage").innerText = "Correct! You can download your certificate.";
        document.getElementById("certificateSection").classList.remove("hidden");
    } else {
        document.getElementById("quizMessage").innerText = "Your answer was submitted.";
    }

    const name = document.getElementById("traineeName").value.trim();
    const simText = document.getElementById("simulationAnswer").value.trim();
    sendToSheet(name, simText, choice);
}

// SEND TO GOOGLE SHEET
function sendToSheet(name, simulation, quiz) {
    fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify({
            name: name,
            simulation: simulation,
            quiz: quiz
        })
    });
}

// CERTIFICATE GENERATOR
function generateCertificate() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF("landscape");

    doc.setFontSize(28);
    doc.text("Certificate of Completion", 150, 60, null, null, "center");

    const name = document.getElementById("traineeName").value;
    doc.setFontSize(22);
    doc.text(name, 150, 90, null, null, "center");

    doc.save("Medical_Communication_Certificate.pdf");
}

</script>

</body>
</html>
