<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Communication Training</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body class="bg-emerald-50 font-sans">

<!-- HEADER -->
<header class="bg-emerald-800 text-white text-center py-6">
<h1 class="text-3xl font-bold">برنامج التدريب على التواصل الطبي</h1>
</header>

<!-- NAV BUTTONS -->
<div class="flex justify-center gap-4 mt-6">
<button onclick="showStep(1)" class="step-btn bg-emerald-600 text-white px-4 py-2 rounded-xl">الاسم</button>
<button onclick="showStep(2)" class="step-btn bg-gray-300 px-4 py-2 rounded-xl">المحاكاة</button>
<button onclick="showStep(3)" class="step-btn bg-gray-300 px-4 py-2 rounded-xl">الاختبار</button>
<button onclick="showStep(4)" class="step-btn bg-gray-300 px-4 py-2 rounded-xl">الشهادة</button>
</div>

<!-- CONTENT -->
<div class="max-w-3xl mx-auto mt-8 bg-white p-8 rounded-3xl shadow-xl">

<!-- STEP 1 -->
<div id="step1" class="step">
<h2 class="text-xl font-bold mb-4">إدخال الاسم</h2>
<input id="traineeName" type="text"
class="w-full border p-3 rounded-xl"
placeholder="اكتب اسمك الكامل هنا">
</div>

<!-- STEP 2 -->
<div id="step2" class="step hidden">
<h2 class="text-xl font-bold mb-4">المحاكاة التدريبية</h2>
<p class="mb-3">مريضة تقول: "أنا خايفة يكون عندي سرطان"</p>

<textarea id="simulationAnswer"
class="w-full p-3 border rounded-xl"
rows="4"></textarea>

<button onclick="evaluateAnswer()"
class="mt-4 bg-emerald-600 text-white px-6 py-2 rounded-xl">
تقييم الرد
</button>

<div id="feedback" class="mt-4 font-bold"></div>
</div>

<!-- STEP 3 -->
<div id="step3" class="step hidden">
<h2 class="text-xl font-bold mb-4">الاختبار السريع</h2>

<button class="w-full mb-3 p-3 bg-gray-100 rounded-xl"
onclick="checkQuiz(false)">
ابدأ بخبر إيجابي
</button>

<button class="w-full mb-3 p-3 bg-gray-100 rounded-xl"
onclick="checkQuiz(true)">
كن مباشراً ثم اصمت
</button>

<button class="w-full mb-3 p-3 bg-gray-100 rounded-xl"
onclick="checkQuiz(false)">
اطلب من التمريض إخبارهم
</button>

<div id="quiz-result" class="mt-4 font-bold"></div>
</div>

<!-- STEP 4 -->
<div id="step4" class="step hidden text-center">
<h2 class="text-xl font-bold mb-4">الشهادة</h2>

<button onclick="generateCertificate()"
class="bg-emerald-700 text-white px-8 py-3 rounded-xl">
تحميل الشهادة
</button>
</div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbzxd_UT0hEq1jVXG3KV9h_1MahWkq84REIOXJOEe6ygCOOqKJviwFmGg7dxmiOv1G7b/exec";

function showStep(stepNumber){
document.querySelectorAll('.step').forEach(step => step.classList.add("hidden"));
document.getElementById("step"+stepNumber).classList.remove("hidden");
}

function evaluateAnswer(){
const answer = document.getElementById("simulationAnswer").value;
const feedback = document.getElementById("feedback");

if(answer.includes("أفهم") || answer.includes("قلق") || answer.includes("معك")){
feedback.innerHTML = "✅ ممتاز — استخدمت التعاطف";
feedback.style.color = "green";
}else{
feedback.innerHTML = "⚠️ حاول البدء بالتعاطف";
feedback.style.color = "red";
}
}

function checkQuiz(correct){

const result = document.getElementById("quiz-result");

if(correct){
result.innerHTML = "✔ إجابة صحيحة — يمكنك الآن تحميل الشهادة";
result.style.color="green";
showStep(4);
}else{
result.innerHTML = "✖ إجابة غير صحيحة";
result.style.color="red";
}

saveToSheet();
}

function saveToSheet(){

const name = document.getElementById("traineeName").value;
const simulation = document.getElementById("simulationAnswer").value;

fetch(scriptURL,{
method:"POST",
body:JSON.stringify({
name:name,
simulation:simulation,
quiz:"submitted"
})
});

}

function generateCertificate(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF("landscape");

doc.setFontSize(26);
doc.text("Certificate of Completion",150,60,null,null,"center");

const name = document.getElementById("traineeName").value;

doc.setFontSize(22);
doc.text(name,150,100,null,null,"center");

doc.save("Certificate.pdf");

}

</script>

</body>
</html>
